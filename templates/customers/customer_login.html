<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login — Loan Ledger</title>
    <meta name="description" content="Customer login to view your transaction history and balance on Loan Ledger.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #f97316;
            --pink: #ec4899;
            --violet: #7c3aed;
            --bg: #f0f2f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -15%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(249,115,22,0.12), transparent 70%);
            animation: floatOrb 9s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -15%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236,72,153,0.1), transparent 70%);
            animation: floatOrb 11s ease-in-out infinite reverse;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(25px, -35px); }
        }

        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--orange), var(--pink));
            border-radius: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(249,115,22,0.3);
        }
        .brand-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--orange), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-header p { color: #6b7280; font-size: 0.9rem; margin-top: 4px; }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow:
                0 4px 6px -1px rgba(0,0,0,0.04),
                0 20px 60px -15px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.04);
            text-align: center;
        }
        .phone-input {
            border-radius: 16px !important;
            padding: 16px 20px !important;
            border: 2px solid #e5e7eb !important;
            font-size: 1.2rem !important;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 600;
            color: #1f2937;
            transition: all 0.2s ease;
            background: #fafafa;
        }
        .phone-input:focus {
            border-color: var(--orange) !important;
            box-shadow: 0 0 0 4px rgba(249,115,22,0.1) !important;
            background: white;
        }
        .phone-input::placeholder {
            color: #9ca3af;
            font-weight: 400;
            letter-spacing: 3px;
        }
        .btn-view {
            background: linear-gradient(135deg, var(--orange), var(--pink));
            color: white;
            border: none;
            border-radius: 16px;
            padding: 15px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-view::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn-view:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(249,115,22,0.4);
            color: white;
        }
        .btn-view:hover::before { left: 100%; }

        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff7ed;
            color: var(--orange);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 24px;
        }
        .link-owner {
            color: var(--violet);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .link-owner:hover { color: #5b21b6; text-decoration: underline; }

        .alert {
            border-radius: 12px;
            font-size: 0.85rem;
            border: none;
            text-align: left;
        }
        .alert-error, .alert-danger { background: #fef2f2; color: #dc2626; }
        .alert-success { background: #f0fdf4; color: #16a34a; }

        @media (max-width: 576px) {
            .login-card { padding: 32px 20px; }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="brand-header">
            <div class="brand-icon"><i class="bi bi-person-badge-fill"></i></div>
            <h1>Customer Login</h1>
            <p>Check your balance & transaction history</p>
        </div>

        <div class="login-card">
            <div class="info-chip">
                <i class="bi bi-shield-check"></i> No password needed — just your phone
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} mb-3">
                        <i class="bi bi-exclamation-circle me-1"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-4">
                    <input type="tel" name="phone" class="form-control phone-input" placeholder="98XXXXXXXX" required maxlength="15" id="phoneInput">
                </div>
                <button type="submit" class="btn btn-view w-100 mb-4" id="viewBtn">
                    <i class="bi bi-eye me-2"></i>VIEW MY KHATA
                </button>
            </form>

            <hr class="my-3" style="border-color: #e5e7eb;">
            <a href="{% url 'login' %}" class="link-owner">
                <i class="bi bi-building me-1"></i> I'm a Business Owner
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
